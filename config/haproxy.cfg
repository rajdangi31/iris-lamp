global
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 2048
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s

# IRIS Frontend — Clients connect here on Port 80
frontend iris_frontend
    bind *:80
    # Add security headers
    http-response set-header X-Frame-Options SAMEORIGIN
    http-response set-header X-Content-Type-Options nosniff
    default_backend iris_backends

# IRIS Backend Cluster
backend iris_backends
    balance roundrobin
    
    # Intelligent health checking via health.php
    option httpchk GET /health.php
    http-check expect status 200

    # ---------------------------------------------------------
    # PRIMARY NODE — Local Arch Linux Node
    # inter 3000: poll every 3s
    # fall 2: mark down after 6s of failure
    # ---------------------------------------------------------
    server primary 127.0.0.1:8080 check inter 3000 rise 2 fall 2

    # ---------------------------------------------------------
    # BACKUP NODE — Remote Ubuntu VM via Tailscale Mesh
    # backup: only receive traffic if primary is down
    # ---------------------------------------------------------
    server backup <BACKUP_NODE_IP>:80 check inter 3000 rise 2 fall 2 backup
