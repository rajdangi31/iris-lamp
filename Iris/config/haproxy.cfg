global
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 2048
    daemon

defaults
    log     global
    mode    http
    timeout connect 5s
    timeout client  30s
    timeout server  30s

# Frontend — clients connect here
frontend iris_frontend
    bind *:80
    default_backend iris_backends

# Backend cluster
backend iris_backends
    balance roundrobin

    # Primary — Arch Apache running locally on 8080
    server primary 127.0.0.1:8080 check inter 3000 rise 2 fall 3

    # Backup — Ubuntu VM via tailscale
    server backup 100.83.235.87:80 check inter 3000 rise 2 fall 3 backup
